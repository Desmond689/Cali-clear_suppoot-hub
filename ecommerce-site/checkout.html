<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - Cali Clear</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/responsive.css">
<link rel="stylesheet" href="components/assets/css/components.css">
<script src="assets/js/main.js"></script>
<script src="assets/js/toast.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#121212;color:#eee;font-family:Poppins,Arial,sans-serif}

.checkout-wrap{
  max-width:1100px;
  margin:40px auto;
  padding:20px;
  display:grid;
  grid-template-columns:1.4fr 1fr;
  gap:30px;
}

.box{
  background:#1e1e1e;
  padding:28px;
  border-radius:14px;
  border:1px solid #2a2a2a;
}

h2{color:#ff6f61;margin-bottom:18px;font-size:20px}

label{font-size:13px;font-weight:600;display:block;margin-bottom:4px;color:#bbb}

input,select{
  width:100%;
  padding:12px 14px;
  margin:6px 0 14px;
  background:#2a2a2a;
  border:1px solid #333;
  border-radius:8px;
  color:#fff;
  font-size:14px;
  transition:border-color .2s;
}
input:focus,select:focus{outline:none;border-color:#ff6f61}
input::placeholder{color:#666}

.row{display:flex;gap:15px}
.row>div{flex:1}

/* Payment method cards */
.pm-list{display:flex;flex-direction:column;gap:10px;margin:10px 0 20px}

.pm-card{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 16px;
  border:2px solid #333;
  border-radius:10px;
  cursor:pointer;
  transition:all .2s;
  background:#222;
}
.pm-card:hover{border-color:#ff6f61;background:#2a1c1a}
.pm-card.selected{border-color:#ff6f61;background:#2a1c1a;box-shadow:0 0 12px rgba(255,111,97,.15)}
.pm-card input[type=radio]{display:none}

.pm-icon{
  width:42px;height:42px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  background:#333;
  flex-shrink:0;
}

.pm-info{flex:1}
.pm-name{font-weight:600;font-size:15px}
.pm-desc{font-size:12px;color:#888;margin-top:2px}

.pm-check{
  width:22px;height:22px;
  border-radius:50%;
  border:2px solid #555;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all .2s;
}
.pm-card.selected .pm-check{
  border-color:#ff6f61;
  background:#ff6f61;
}
.pm-card.selected .pm-check::after{
  content:'✓';color:#fff;font-size:13px;font-weight:bold;
}

/* Buttons */
.btn{
  background:#ff6f61;
  color:#fff;
  border:none;
  padding:15px;
  width:100%;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  font-weight:600;
  font-family:Poppins,sans-serif;
  transition:all .2s;
  margin-top:10px;
}
.btn:hover{background:#ff4a3b;transform:translateY(-1px)}
.btn:disabled{background:#555;cursor:not-allowed;transform:none}
.btn-secondary{background:#333}
.btn-secondary:hover{background:#444}

/* Summary */
.summary p{display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px}
.summary .total-row{font-size:18px;font-weight:700;color:#ff6f61}
.summary hr{border-color:#333;margin:12px 0}

.order-items-list{
  background:#2a2a2a;
  border-radius:8px;
  padding:12px;
  margin:10px 0;
}
.order-items-list .item{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  font-size:13px;
  border-bottom:1px solid #333;
}
.order-items-list .item:last-child{border:none}

/* Loading spinner */
.spinner{
  display:inline-block;
  width:20px;height:20px;
  border:2px solid #fff;
  border-top-color:transparent;
  border-radius:50%;
  animation:spin .6s linear infinite;
  margin-right:8px;
  vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Success state */
.success-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
.success-overlay.show{display:flex}

.success-box{
  background:#1e1e1e;
  padding:40px;
  border-radius:16px;
  text-align:center;
  max-width:420px;
  width:90%;
  border:1px solid #333;
  animation:slideUp .4s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.success-box .checkmark{
  width:70px;height:70px;
  background:#4caf50;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  margin:0 auto 20px;
}
.success-box h2{color:#4caf50;margin-bottom:10px}
.success-box p{color:#aaa;font-size:14px;margin-bottom:8px}

#toast-container{position:fixed;top:20px;right:20px;z-index:9999}

@media(max-width:768px){
  .checkout-wrap{grid-template-columns:1fr;padding:10px}
  .pm-card{padding:12px}
}
</style>
</head>
<body>

<!-- SSL Banner -->
<div style="background:#4caf50;color:#fff;padding:8px;text-align:center;font-size:13px;">
  🔒 <strong>Secure Checkout</strong> - Your connection is SSL encrypted
</div>

<div id="toast-container"></div>

<!-- NAVBAR -->
<div id="navbar-placeholder"></div>

<!-- CHECKOUT CONTENT -->
<div class="checkout-wrap">

  <!-- Left Column: Shipping & Payment -->
  <div>
    <!-- Shipping Info -->
    <div class="box">
      <h2>Shipping Information</h2>
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" placeholder="John Doe" required>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="john@example.com" required>
      <label for="address">Address</label>
      <input type="text" id="address" placeholder="123 Main St" required>
      <div class="row">
        <div>
          <label for="city">City</label>
          <input type="text" id="city" placeholder="Los Angeles" required>
        </div>
        <div>
          <label for="zip">ZIP Code</label>
          <input type="text" id="zip" placeholder="90001" required>
        </div>
      </div>
    </div>

    <!-- Payment Methods -->
    <div class="box" style="margin-top:20px">
      <h2>Payment Method</h2>
      <div class="pm-list" id="pm-list">
        <div style="color:#888;padding:20px;text-align:center">Loading payment methods...</div>
      </div>
    </div>
  </div>

  <!-- Right Column: Order Summary -->
  <div>
    <div class="box">
      <h2>Order Summary</h2>
      <div id="order-summary">
        <p style="color:#888">Loading cart...</p>
      </div>
      <hr style="border-color:#333;margin:12px 0">
      <div class="summary">
        <p><span>Subtotal</span><span id="subtotal">$0.00</span></p>
        <p><span>Tax (10%)</span><span id="tax">$0.00</span></p>
        <hr>
        <p class="total-row"><span>Total</span><span id="total">$0.00</span></p>
      </div>
      <button class="btn" id="placeOrderBtn" disabled>Place Order & Pay</button>
    </div>
  </div>

</div>

<!-- Success Overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <div class="checkmark">✓</div>
    <h2>Order Placed!</h2>
    <p>Your order has been submitted successfully.</p>
    <p id="successOrderId"></p>
  </div>
</div>

<!-- FOOTER -->
<div id="footer-placeholder"></div>

<script>
  function loadFooterWithChat() {
    fetch('components/footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;

        // Ensure chat bootstrap script is loaded and initialized (works for injected footer)
        if (!document.getElementById('chatbot-script')) {
          const s = document.createElement('script');
          s.id = 'chatbot-script';
          s.src = 'assets/js/chatbot.js';
          s.onload = () => { if (typeof initChat === 'function') initChat(); };
          document.body.appendChild(s);
        } else if (typeof initChat === 'function') {
          initChat();
        }
      })
      .catch(err => console.error('Error loading footer:', err));
  }

  document.addEventListener('DOMContentLoaded', loadFooterWithChat);
</script>

<script>
const API = '/api';
let cartItems = [];
let paymentMethods = [];
let selectedPM = null;
let orderTotal = 0;
let lastOrderId = null;

// ─── Init ───
document.addEventListener('DOMContentLoaded', async () => {
  await loadCart();
  await loadPaymentMethods();
  prefillForm();
});

// ─── Auth headers ───
function authHeaders() {
  const t = localStorage.getItem('access_token');
  return { 'Content-Type': 'application/json', 'Authorization': t ? `Bearer ${t}` : '' };
}

// ─── Cart ───
async function loadCart() {
  try {
    const r = await fetch(`${API}/cart`);
    if (r.ok) {
      const d = await r.json();
      cartItems = d.data || [];
    }
  } catch {
    cartItems = JSON.parse(localStorage.getItem('cart') || '[]');
  }
  renderSummary();
}

function renderSummary() {
  const el = document.getElementById('order-summary');
  if (!cartItems.length) {
    el.innerHTML = '<p style="color:#888">Your cart is empty</p>';
    document.getElementById('placeOrderBtn').disabled = true;
    return;
  }
  let html = '<div class="order-items-list">';
  let sub = 0;
  cartItems.forEach(i => {
    const t = i.price * i.quantity;
    sub += t;
    html += `<div class="item"><span>${i.name} x${i.quantity}</span><span>$${t.toFixed(2)}</span></div>`;
  });
  html += '</div>';
  el.innerHTML = html;

  const tax = sub * 0.10;
  const total = sub + tax;
  orderTotal = total;

  document.getElementById('subtotal').textContent = `$${sub.toFixed(2)}`;
  document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
  document.getElementById('total').textContent = `$${total.toFixed(2)}`;

  if (selectedPM) document.getElementById('placeOrderBtn').disabled = false;
}

// ─── Payment Methods ───
async function loadPaymentMethods() {
  try {
    const r = await fetch(`${API}/payment-methods`);
    const d = await r.json();
    if (d.status === 'success') {
      paymentMethods = d.data || [];
      renderPaymentMethods();
    }
  } catch (e) {
    console.error('Error loading payment methods:', e);
    document.getElementById('pm-list').innerHTML =
      '<div style="color:#f44;padding:20px;text-align:center">Failed to load payment methods</div>';
  }
}

function renderPaymentMethods() {
  const el = document.getElementById('pm-list');
  if (!paymentMethods.length) {
    el.innerHTML = '<div style="color:#888;padding:20px;text-align:center">No payment methods available</div>';
    return;
  }
  el.innerHTML = paymentMethods.map(pm => `
    <label class="pm-card" data-slug="${pm.slug}" onclick="selectPM('${pm.slug}')">
      <input type="radio" name="payment_method" value="${pm.slug}">
      <div class="pm-icon">${pm.icon || '💳'}</div>
      <div class="pm-info">
        <div class="pm-name">${pm.name}</div>
        <div class="pm-desc">${pm.instructions ? pm.instructions.split('\n')[0] : ''}</div>
      </div>
      <div class="pm-check"></div>
    </label>
  `).join('');

  // Auto-select first
  if (paymentMethods.length === 1) selectPM(paymentMethods[0].slug);
}

function selectPM(slug) {
  selectedPM = paymentMethods.find(m => m.slug === slug);
  document.querySelectorAll('.pm-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`.pm-card[data-slug="${slug}"]`);
  if (card) card.classList.add('selected');
  if (cartItems.length) document.getElementById('placeOrderBtn').disabled = false;
}

// ─── Prefill ───
function prefillForm() {
  const name = localStorage.getItem('user_name') || '';
  const email = localStorage.getItem('user_email') || '';
  if (name) document.getElementById('fullName').value = name;
  if (email) document.getElementById('email').value = email;
}

// ─── Place Order ───
document.getElementById('placeOrderBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('placeOrderBtn');

  // Validate form
  const fullName = document.getElementById('fullName').value.trim();
  const email = document.getElementById('email').value.trim();
  const address = document.getElementById('address').value.trim();
  const city = document.getElementById('city').value.trim();
  const zip = document.getElementById('zip').value.trim();

  if (!fullName || !email || !address || !city || !zip) {
    showToast('Please fill in all fields');
    return;
  }
  if (!selectedPM) {
    showToast('Please select a payment method');
    return;
  }
  if (!cartItems.length) {
    showToast('Your cart is empty');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Processing...';

  try {
    const payload = {
      email,
      customer_name: fullName,
      shipping_address: address,
      city,
      zip_code: zip,
      payment_method: selectedPM.slug,
      items: cartItems.map(i => ({
        product_id: i.id || i.product_id,
        quantity: i.quantity || i.qty,
        price: i.price
      })),
      total: orderTotal
    };

    const r = await fetch(`${API}/orders`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify(payload)
    });

    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.error || 'Order creation failed');
    }

    const data = await r.json();
    lastOrderId = data.data.order_id;

    // Store for chat
    localStorage.setItem('user_email', email);
    localStorage.setItem('user_name', fullName);
    localStorage.setItem('last_order_id', lastOrderId);

    // Clear cart
    localStorage.removeItem('cart');
    document.cookie = 'cart_id=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';

    // Open chat directly (no blocking modal)
    if (typeof showToast === 'function') {
      showToast('Order request sent. Opening chat...');
    }

    if (document.getElementById('successOverlay')) {
      document.getElementById('successOverlay').style.display = 'none';
    }

    setTimeout(async () => {
      openChatForOrder(lastOrderId, email, fullName);

      // Immediate local chat message fallback while backend messages may sync
      if (typeof appendUserMessage === 'function') {
        appendUserMessage(`🛒 New Order\nOrder ID: #${lastOrderId}\nTotal: $${orderTotal.toFixed(2)}\nPayment: ${selectedPM.name || 'Pending'}`);
      }
      if (typeof appendBotMessage === 'function') {
        appendBotMessage('🤖 Thanks for your order! Preparing payment details; admin will send bank/payment instructions here.');
      }

      // Create a canonical order message in chat API (ensures it appears in thread)
      try {
        await fetch('/api/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: email,
            name: fullName,
            message: `🛒 New Order\nOrder ID: #${lastOrderId}\nTotal: $${orderTotal.toFixed(2)}\nPayment: ${selectedPM.name || 'Pending'}`,
            message_type: 'order',
            order_id: lastOrderId
          })
        });
      } catch (err) {
        console.error('Chat auto-order message failed', err);
      }
    }, 300);

  } catch (err) {
    showToast(err.message || 'Something went wrong');
    btn.disabled = false;
    btn.textContent = 'Place Order & Pay';
  }
});

// ─── Open Chat ───
function openChatForOrder(orderId, email, name) {
  const bubble = document.getElementById('chat-bubble');
  const panel = document.getElementById('chat-panel');

  // If chat elements are not ready yet, retry shortly.
  if (!bubble || !panel) {
    setTimeout(() => openChatForOrder(orderId, email, name), 150);
    return;
  }

  // Set chat identity and order context
  chatEmail = email;
  chatName = name;
  window._chatOrderId = orderId;

  panel.classList.remove('hidden');

  // Ensure history load: if function exists now, run immediately; else retry.
  if (typeof loadChatHistory === 'function') {
    loadChatHistory();
  } else {
    setTimeout(() => {
      if (typeof loadChatHistory === 'function') loadChatHistory();
    }, 150);
  }

  // Add quick actions after page chat load
  setTimeout(() => {
    if (typeof showQuickActions === 'function') {
      showQuickActions(orderId);
    }
  }, 250);
}

function showQuickActions(orderId) {
  const messages = document.getElementById('chat-messages');
  if (!messages) return;

  const actionsHtml = `
    <div class="quick-actions" id="quick-actions-${orderId}" style="
      display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;padding:12px;
      background:#2a2a2a;border-radius:10px;justify-content:center;
    ">
      <button onclick="quickAction('i_have_paid','${orderId}')" style="
        background:#4caf50;color:#fff;border:none;padding:8px 14px;
        border-radius:20px;cursor:pointer;font-size:13px;font-family:Poppins;
      ">💰 I Have Paid</button>
      <button onclick="quickAction('track_order','${orderId}')" style="
        background:#2196f3;color:#fff;border:none;padding:8px 14px;
        border-radius:20px;cursor:pointer;font-size:13px;font-family:Poppins;
      ">📦 Track Order</button>
      <button onclick="quickAction('cancel_order','${orderId}')" style="
        background:#f44336;color:#fff;border:none;padding:8px 14px;
        border-radius:20px;cursor:pointer;font-size:13px;font-family:Poppins;
      ">❌ Cancel Order</button>
      <button onclick="quickAction('talk_to_agent','${orderId}')" style="
        background:#9c27b0;color:#fff;border:none;padding:8px 14px;
        border-radius:20px;cursor:pointer;font-size:13px;font-family:Poppins;
      ">🧑‍💼 Talk to Agent</button>
    </div>
  `;

  // Check if already added
  if (!document.getElementById(`quick-actions-${orderId}`)) {
    messages.innerHTML += actionsHtml;
    messages.scrollTop = messages.scrollHeight;
  }
}

async function quickAction(action, orderId) {
  const email = localStorage.getItem('user_email') || document.getElementById('email')?.value;
  const name = localStorage.getItem('user_name') || document.getElementById('fullName')?.value;

  if (!email) return;

  try {
    const r = await fetch(`${API}/messages/quick-action`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, name: name || 'Guest', action, order_id: orderId })
    });
    const d = await r.json();

    // Reload chat to show new messages
    if (typeof loadChatHistory === 'function') {
      setTimeout(() => loadChatHistory(), 300);
    }

    // If action is "i_have_paid", show proof upload form
    if (action === 'i_have_paid') {
      setTimeout(() => showProofUploadForm(orderId), 500);
    }
  } catch (e) {
    console.error('Quick action error:', e);
  }
}

function showProofUploadForm(orderId) {
  const messages = document.getElementById('chat-messages');
  if (!messages) return;

  const formHtml = `
    <div id="proof-form-${orderId}" style="
      background:#2a2a2a;padding:16px;border-radius:10px;margin:12px 0;
    ">
      <div style="font-weight:600;margin-bottom:10px;color:#ff6f61;">Upload Payment Proof</div>
      <label style="font-size:12px;color:#888">Transaction ID</label>
      <input type="text" id="proof-txn-${orderId}" placeholder="e.g. TXN123456" style="
        width:100%;padding:10px;background:#333;border:1px solid #444;border-radius:6px;
        color:#fff;font-size:13px;margin:4px 0 10px;box-sizing:border-box;
      ">
      <label style="font-size:12px;color:#888">Screenshot</label>
      <input type="file" id="proof-file-${orderId}" accept="image/*" style="
        width:100%;padding:8px;background:#333;border:1px solid #444;border-radius:6px;
        color:#fff;font-size:12px;margin:4px 0 10px;box-sizing:border-box;
      ">
      <label style="font-size:12px;color:#888">Note (optional)</label>
      <input type="text" id="proof-note-${orderId}" placeholder="Any additional info" style="
        width:100%;padding:10px;background:#333;border:1px solid #444;border-radius:6px;
        color:#fff;font-size:13px;margin:4px 0 12px;box-sizing:border-box;
      ">
      <button onclick="submitProof('${orderId}')" style="
        background:#ff6f61;color:#fff;border:none;padding:10px 20px;
        border-radius:8px;cursor:pointer;font-size:14px;font-family:Poppins;
        font-weight:600;width:100%;
      ">Submit Proof</button>
    </div>
  `;

  if (!document.getElementById(`proof-form-${orderId}`)) {
    messages.innerHTML += formHtml;
    messages.scrollTop = messages.scrollHeight;
  }
}

async function submitProof(orderId) {
  const email = localStorage.getItem('user_email');
  const name = localStorage.getItem('user_name') || 'Guest';
  const txnId = document.getElementById(`proof-txn-${orderId}`)?.value || '';
  const note = document.getElementById(`proof-note-${orderId}`)?.value || '';
  const fileInput = document.getElementById(`proof-file-${orderId}`);

  let screenshotBase64 = '';
  if (fileInput && fileInput.files[0]) {
    screenshotBase64 = await new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(fileInput.files[0]);
    });
  }

  try {
    const r = await fetch(`${API}/messages/proof`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email,
        name,
        order_id: orderId,
        transaction_id: txnId,
        screenshot: screenshotBase64,
        note
      })
    });

    if (r.ok) {
      showToast('Payment proof submitted!');
      // Remove form
      const form = document.getElementById(`proof-form-${orderId}`);
      if (form) form.remove();
      // Reload chat
      if (typeof loadChatHistory === 'function') {
        setTimeout(() => loadChatHistory(), 500);
      }
    }
  } catch (e) {
    showToast('Failed to submit proof');
  }
}

// Expose globally
window.quickAction = quickAction;
window.submitProof = submitProof;
window.showQuickActions = showQuickActions;
</script>

</body>
</html>
