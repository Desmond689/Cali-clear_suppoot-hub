<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>Login | Cali Clear</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      max-width: 450px;
      width: 100%;
      background: #121212;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 50px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .login-logo {
      font-size: 48px;
      margin-bottom: 12px;
    }
    
    .login-title {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    
    .login-subtitle {
      color: #888;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      display: block;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      transition: 0.2s;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #ff6f61;
      background: #252525;
      box-shadow: 0 0 0 3px rgba(255, 111, 97, 0.1);
    }
    
    .form-input::placeholder {
      color: #555;
    }
    
    .password-group {
      position: relative;
    }
    
    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 18px;
      padding: 4px 8px;
      transition: 0.2s;
    }
    
    .password-toggle:hover {
      color: #ff6f61;
    }
    
    .forgot-password {
      text-align: right;
      margin-bottom: 24px;
    }
    
    .forgot-password a {
      color: #ff6f61;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: 0.2s;
    }
    
    .forgot-password a:hover {
      color: #ff8a7b;
    }
    
    .login-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff6f61 0%, #ff8a7b 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 111, 97, 0.3);
    }
    
    .login-btn:active {
      transform: translateY(0);
    }
    
    .login-btn.loading {
      opacity: 0.8;
      cursor: not-allowed;
    }
    
    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
      display: none;
    }
    
    .message.error {
      background: rgba(244, 67, 54, 0.1);
      color: #ff8a80;
      border: 1px solid rgba(244, 67, 54, 0.2);
      display: block;
    }
    
    .message.success {
      background: rgba(76, 175, 80, 0.1);
      color: #81c784;
      border: 1px solid rgba(76, 175, 80, 0.2);
      display: block;
    }
    
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #2a2a2a;
    }
    
    .auth-footer-text {
      color: #888;
      font-size: 14px;
    }
    
    .auth-footer-link {
      color: #ff6f61;
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }
    
    .auth-footer-link:hover {
      color: #ff8a7b;
    }
    
    @media (max-width: 500px) {
      .login-container {
        padding: 40px 24px;
      }
      
      .login-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">🍃</div>
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to your account</p>
    </div>
    
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input 
          type="email" 
          id="login-email" 
          class="form-input" 
          placeholder="you@example.com" 
          required
          autocomplete="email"
        >
      </div>
      
      <div class="form-group password-group">
        <label class="form-label" for="login-password">Password</label>
        <input 
          type="password" 
          id="login-password" 
          class="form-input" 
          placeholder="••••••••" 
          required
          minlength="6"
          autocomplete="current-password"
        >
        <button 
          type="button" 
          class="password-toggle" 
          id="toggle-login-password"
          aria-label="Show/Hide Password"
        >👁️</button>
      </div>
      
      <div class="forgot-password">
        <a href="forgot.html">Forgot your password?</a>
      </div>
      
      <button type="submit" class="login-btn" id="login-submit">Sign In</button>
      
      <div class="message" id="login-msg"></div>
    </form>
    
    <div class="auth-footer">
      <p class="auth-footer-text">
        Don't have an account? 
        <a href="register.html" class="auth-footer-link">Create one</a>
      </p>
    </div>
  </div>
  
  <!-- Toast container -->
  <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>
  
  <script src="assets/js/toast.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
