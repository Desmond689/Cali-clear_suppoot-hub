<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<title>Shop - Cali Clear</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Components CSS -->
<link rel="stylesheet" href="components/assets/css/components.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/responsive.css">

<!-- JS for navbar toggle -->
<script src="assets/js/main.js"></script>
<script src="assets/js/toast.js"></script>

<style>
/* ================= GLOBAL ================= */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #121212;
  color: #e0e0e0;
}

a { text-decoration: none; }

/* ================= SHOP ================= */
.shop-container {
  max-width: 1200px;
  margin: 60px auto;
  padding: 0 20px;
}

/* Filter */
.shop-filter {
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

.shop-filter input,
.shop-filter select {
  flex: 1;
  min-width: 200px;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #1e1e1e;
  color: #fff;
  outline: none;
}

/* Grid */
.products-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 25px;
}

/* Card */
.product-card {
  background: #1e1e1e;
  border-radius: 14px;
  padding: 15px;
  transition: 0.3s ease;
}

.product-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 30px rgba(255,111,97,0.3);
}

.product-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

.product-card h3 {
  margin: 12px 0 5px;
  font-size: 16px;
  font-weight: 500;
}

.price {
  color: #ff6f61;
  font-weight: 600;
  margin-bottom: 10px;
}

.product-card button {
  width: 100%;
  padding: 10px;
  background: #ff6f61;
  border: none;
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  transition: 0.3s;
  margin-top: 10px;
}

.product-card button:hover {
  background: #ff4a3b;
}

.product-card .view-btn {
  background: #333;
  margin-bottom: 8px;
}

.product-card .view-btn:hover {
  background: #555;
}

/* ================= TOAST ================= */
#toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
}

.toast {
  background: #1e1e1e;
  padding: 12px 20px;
  margin-bottom: 10px;
  border-left: 4px solid #ff6f61;
  border-radius: 6px;
  font-size: 14px;
}

/* ================= FOOTER ================= */
.site-footer {
  background: #0f0f0f;
  color: #e0e0e0;
  padding: 60px 20px 20px;
}

.footer-container {
  max-width: 1200px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 40px;
}

.footer-logo {
  color: #ff6f61;
  font-size: 26px;
  margin-bottom: 10px;
}

.footer-text {
  font-size: 14px;
  color: #bdbdbd;
}

.footer-col h4 {
  margin-bottom: 15px;
  color: #fff;
}

.footer-col ul {
  list-style: none;
  padding: 0;
}

.footer-col ul li {
  margin-bottom: 10px;
}

.footer-col ul li a {
  color: #bdbdbd;
  transition: 0.3s;
}

.footer-col ul li a:hover {
  color: #ff6f61;
  padding-left: 5px;
}

.payment-icons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.payment-icons span {
  background: #1e1e1e;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  border: 1px solid #2a2a2a;
}

.newsletter-form {
  display: flex;
  gap: 10px;
}

.newsletter-form input {
  flex: 1;
  padding: 10px;
  background: #1e1e1e;
  border: none;
  border-radius: 6px;
  color: #fff;
}

.newsletter-form button {
  background: #ff6f61;
  border: none;
  border-radius: 6px;
  padding: 10px 15px;
  color: #fff;
  cursor: pointer;
}

.footer-bottom {
  text-align: center;
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid #222;
  font-size: 13px;
  color: #777;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 900px) {
  .products-grid { grid-template-columns: repeat(2, 1fr); }
  .footer-container { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 500px) {
  .products-grid { grid-template-columns: 1fr; }
  .footer-container { grid-template-columns: 1fr; text-align: center; }
  .newsletter-form { flex-direction: column; }
}

/* ================= TESTIMONIALS ================= */
.testimonials-section {
  background: #1a1a1a;
  padding: 50px 20px;
  margin: 40px 0;
}

.testimonials-container {
  max-width: 1200px;
  margin: 0 auto;
  text-align: center;
}

.testimonials-section h2 {
  color: #ff6f61;
  font-size: 32px;
  margin-bottom: 40px;
}

.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 30px;
}

.testimonial-card {
  background: #252525;
  padding: 30px;
  border-radius: 12px;
  text-align: left;
}

.testimonial-stars {
  color: #ffc107;
  font-size: 20px;
  margin-bottom: 15px;
}

.testimonial-text {
  font-style: italic;
  color: #ccc;
  line-height: 1.6;
  margin-bottom: 20px;
}

.testimonial-author {
  font-weight: 600;
  color: #fff;
}

.testimonial-location {
  font-size: 13px;
  color: #888;
  margin-top: 5px;
}

.testimonial-badge {
  display: inline-block;
  background: #4caf50;
  color: #fff;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  margin-top: 10px;
}
</style>
</head>
<body>

<!-- NAVBAR -->
<div id="navbar-placeholder"></div>
<div id="footer-placeholder"></div>
<script>
  function loadFooterWithChat() {
    fetch('components/footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;

        // Ensure chat bootstrap script is loaded and initialized (works for injected footer)
        if (!document.getElementById('chatbot-script')) {
          const s = document.createElement('script');
          s.id = 'chatbot-script';
          s.src = 'assets/js/chatbot.js';
          s.onload = () => { if (typeof initChat === 'function') initChat(); };
          document.body.appendChild(s);
        } else if (typeof initChat === 'function') {
          initChat();
        }
      })
      .catch(err => console.error('Error loading footer:', err));
  }

  document.addEventListener('DOMContentLoaded', loadFooterWithChat);
</script>

<main class="shop-container">
  <div class="shop-header">
    <h1>Shop</h1>
    <div class="shop-search-sort">
      <input id="search-bar" type="text" placeholder="Search products..." aria-label="Search products">
      <select id="sort-select"><option value="default">Sort by</option><option value="price-asc">Price: Low to High</option><option value="price-desc">Price: High to Low</option></select>
    </div>
  </div>
  <div id="products-grid" class="products-grid"></div>
</main>

<script src="assets/js/toast.js"></script>
<script src="assets/js/products.js"></script>
<script src="assets/js/cart.js"></script>

</body>
</html>
